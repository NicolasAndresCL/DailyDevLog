name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies (venv limpio desde el lockfile)
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Type check (mypy)
        run: uv run mypy .

      - name: Django system checks
        run: uv run python manage.py check

      - name: Tests + cobertura (pytest)
        run: uv run pytest
